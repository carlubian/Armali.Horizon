###############################################################################
# Armali Horizon — Docker Compose
#
# Despliega el sistema completo: Identity, Segaris, Autoconfig y Redis.
# Pensado para usarse desde Portainer o directamente con `docker compose up`.
#
# Puertos por defecto:
#   - Identity:   5149
#   - Segaris:    5122
#   - Autoconfig: 5004
#   - Redis:      6379
#
# Variables de entorno configurables (se pueden sobreescribir con un .env):
#   - HORIZON_SEQ_ENDPOINT   → URL de Seq para logging centralizado
#   - HORIZON_SEQ_APIKEY     → API key de Seq (opcional)
#   - DATALAKE_ACCOUNT_KEY   → Clave de Azure Data Lake (Segaris y Autoconfig)
#   - IDENTITY_SEED_USER     → Usuario inicial de Identity (por defecto: admin)
#   - IDENTITY_SEED_PASSWORD → Contraseña del usuario inicial (por defecto: admin)
#   - AUTOCONFIG_MAX_FILE_BYTES → Tamaño máximo en bytes del archivo devuelto vía IO (por defecto: 2 MB)
###############################################################################

services:

  # ─── Redis ─────────────────────────────────────────────────────────────────────
  # Bus de eventos IO (pub/sub). Escucha en todas las interfaces, sin autenticación.
  redis:
    image: redis:7-alpine
    container_name: horizon-redis
    command: ["redis-server", "--bind", "0.0.0.0", "--protected-mode", "no"]
    ports:
      - "6379:6379"
    volumes:
      - /data/volumes/redis:/data
    restart: unless-stopped

  # ─── Identity ──────────────────────────────────────────────────────────────────
  # Servicio central de autenticación, usuarios, roles y tokens.
  # Debe arrancar antes que Segaris y Autoconfig (dependen de él vía IO).
  identity:
    image: olyssia.azurecr.io/armali-horizon-identity:latest
    container_name: horizon-identity
    ports:
      - "5149:5149"
    volumes:
      - /data/volumes/identity:/persistence
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Horizon__ConnectionStrings__Identity=Data Source=/persistence/identity.db
      - Horizon__Events__Endpoint=horizon-redis:6379
      - Horizon__Events__DefaultTimeoutSeconds=10
      - Horizon__Seed__UserName=${IDENTITY_SEED_USER:-armali}
      - Horizon__Seed__Password=${IDENTITY_SEED_PASSWORD:-armali}
      - Horizon__Logging__Endpoint=${HORIZON_SEQ_ENDPOINT:-http://node1.armali.com:5341}
      - Horizon__Logging__ApiKey=${HORIZON_SEQ_APIKEY:-}
      - Horizon__Logging__MinimumLevel=Information
    depends_on:
      - redis
    restart: unless-stopped

  # ─── Segaris ───────────────────────────────────────────────────────────────────
  # Aplicación principal: módulos de negocio (Capex, Opex, Assets, etc.).
  segaris:
    image: olyssia.azurecr.io/armali-horizon-segaris:latest
    container_name: horizon-segaris
    ports:
      - "5122:5122"
    volumes:
      - /data/volumes/segaris:/persistence
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Horizon__ConnectionStrings__Segaris=Data Source=/persistence/segaris_v4.db
      - Horizon__Events__Endpoint=horizon-redis:6379
      - Horizon__Events__DefaultTimeoutSeconds=10
      - Horizon__Logging__Endpoint=${HORIZON_SEQ_ENDPOINT:-http://node1.armali.com:5341}
      - Horizon__Logging__ApiKey=${HORIZON_SEQ_APIKEY:-}
      - Horizon__Logging__MinimumLevel=Information
      - DATALAKE_ACCOUNT_KEY=${DATALAKE_ACCOUNT_KEY:-}
    depends_on:
      - redis
      - identity
    restart: unless-stopped

  # ─── Autoconfig ────────────────────────────────────────────────────────────────
  # Aplicación de aprovisionamiento de configuración.
  autoconfig:
    image: olyssia.azurecr.io/armali-horizon-autoconfig:latest
    container_name: horizon-autoconfig
    ports:
      - "5004:5004"
    volumes:
      - /data/volumes/autoconfig:/persistence
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Horizon__ConnectionStrings__Autoconfig=Data Source=/persistence/autoconfig.db
      - Horizon__Events__Endpoint=horizon-redis:6379
      - Horizon__Events__DefaultTimeoutSeconds=10
      - Horizon__Logging__Endpoint=${HORIZON_SEQ_ENDPOINT:-http://node1.armali.com:5341}
      - Horizon__Logging__ApiKey=${HORIZON_SEQ_APIKEY:-}
      - Horizon__Logging__MinimumLevel=Information
      - Horizon__Autoconfig__MaxFileBytes=${AUTOCONFIG_MAX_FILE_BYTES:-2097152}
      - DATALAKE_ACCOUNT_KEY=${DATALAKE_ACCOUNT_KEY:-}
    depends_on:
      - redis
      - identity
    restart: unless-stopped
