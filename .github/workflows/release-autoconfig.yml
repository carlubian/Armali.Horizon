# ──────────────────────────────────────────────────────────────
# Release Autoconfig — Build & push Docker image to ACR
# Se ejecuta manualmente desde GitHub UI (Actions → Run workflow)
# ──────────────────────────────────────────────────────────────
name: Release Autoconfig

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versión a publicar (semver, ej: 1.1.0)"
        required: true
        type: string

# ── Secrets necesarios en el repositorio ──────────────────────
#   ACR_REGISTRY   → hostname del registry  (ej: turegistro.azurecr.io)
#   ACR_USERNAME   → service-principal appId o admin user
#   ACR_PASSWORD   → service-principal password o admin password

permissions:
  contents: write          # necesario para crear el tag de Git

jobs:
  release:
    name: Build & Push v${{ inputs.version }}
    runs-on: ubuntu-latest

    steps:
      # ── 1. Validar que se ejecuta desde HEAD de main ────────
      - name: Validar rama main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Esta acción solo puede ejecutarse desde la rama main (actual: ${{ github.ref }})"
          exit 1

      # ── 2. Validar formato semver del input ─────────────────
      - name: Validar formato de versión
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::El formato de versión '$VERSION' no es válido. Usa semver: X.Y.Z"
            exit 1
          fi

      # ── 3. Checkout del código ──────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      # ── 4. Verificar que el checkout es HEAD de main ────────
      - name: Verificar HEAD de main
        run: |
          git fetch origin main --depth=1
          MAIN_SHA=$(git rev-parse origin/main)
          CURRENT_SHA=$(git rev-parse HEAD)
          if [ "$MAIN_SHA" != "$CURRENT_SHA" ]; then
            echo "::error::El commit actual ($CURRENT_SHA) no coincide con HEAD de main ($MAIN_SHA). Asegúrate de que main está actualizada."
            exit 1
          fi
          echo "✅ Commit verificado: $CURRENT_SHA"

      # ── 5. Login en Azure Container Registry ────────────────
      - name: Login en ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── 6. Build & Push de la imagen Docker ─────────────────
      - name: Build & Push imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Armali.Horizon.Autoconfig/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ inputs.version }}
          tags: |
            ${{ secrets.ACR_REGISTRY }}/armali-horizon-autoconfig:${{ inputs.version }}
            ${{ secrets.ACR_REGISTRY }}/armali-horizon-autoconfig:latest

      # ── 7. Crear tag de Git para trazabilidad ───────────────
      - name: Crear tag de Git
        run: |
          TAG="autoconfig/v${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release Autoconfig v${{ inputs.version }}"
          git push origin "$TAG"
          echo "🏷️ Tag creado: $TAG"

